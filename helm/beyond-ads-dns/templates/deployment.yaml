{{- /* Render Deployment whenever DNS is not hostNetwork (default: nodePort). Only skip for explicit hostNetwork. */}}
{{- if ne (index .Values "dns" "exposeMode" | default "nodePort") "hostNetwork" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "beyond-ads-dns.fullname" . }}
  labels:
    {{- include "beyond-ads-dns.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "beyond-ads-dns.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "beyond-ads-dns.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if and (not .Values.clickhouse.enabled) (not .Values.config.persistence.enabled) }}
        checksum/config-overrides: {{ include (print $.Template.BasePath "/config-overrides-cm.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.restartToken }}
        restartToken: {{ . | quote }}
        {{- end }}
    spec:
      {{- if eq .Values.dns.exposeMode "hostNetwork" }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.redis.enabled (and .Values.config.persistence.enabled (not .Values.clickhouse.enabled)) (and .Values.clickhouse.enabled (or .Values.clickhouse.existingSecret (ne .Values.clickhouse.password ""))) (and .Values.config.persistence.enabled .Values.sync.enabled) }}
      initContainers:
        {{- if .Values.redis.enabled }}
        - name: wait-for-redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              HOST="{{ .Release.Name }}-redis-master"
              PORT="6379"
              {{- if and .Values.redis.enabled (index .Values "redis" "auth" "enabled") }}
              until redis-cli -h "$HOST" -p "$PORT" -a "$REDIS_PASSWORD" ping 2>/dev/null; do echo "waiting for Redis at $HOST:$PORT"; sleep 2; done
              {{- else }}
              until redis-cli -h "$HOST" -p "$PORT" ping 2>/dev/null; do echo "waiting for Redis at $HOST:$PORT"; sleep 2; done
              {{- end }}
          {{- if and .Values.redis.enabled (index .Values "redis" "auth" "enabled") }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis
                  key: redis-password
          {{- end }}
        {{- end }}
        {{- if and .Values.config.persistence.enabled (not .Values.clickhouse.enabled) }}
        - name: patch-query-store-disabled
          image: {{ include "beyond-ads-dns.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              # Ensure query_store.enabled is false in persisted config so app does not wait for ClickHouse
              CONFIG="/app/config-overrides/config.yaml"
              if [ -f "$CONFIG" ]; then
                awk '/^query_store:/{in_qs=1} in_qs && /^  enabled:/{gsub(/true/,"false"); in_qs=0} {print}' "$CONFIG" > "$CONFIG.tmp" && mv "$CONFIG.tmp" "$CONFIG"
              else
                mkdir -p /app/config-overrides
                printf 'query_store:\n  enabled: false\n' > "$CONFIG"
              fi
          volumeMounts:
            - name: config-overrides
              mountPath: /app/config-overrides
        {{- end }}
        {{- if and .Values.clickhouse.enabled (or .Values.clickhouse.existingSecret (ne .Values.clickhouse.password "")) }}
        - name: set-query-store-password
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              CONFIG="/app/config-overrides/config.yaml"
              mkdir -p /app/config-overrides
              {{- if .Values.clickhouse.existingSecret }}
              PW_FILE="/secrets/{{ .Values.clickhouse.passwordSecretKey | default "password" }}"
              if [ -f "$PW_FILE" ]; then
                PW=$(cat "$PW_FILE")
              else
                PW={{ .Values.clickhouse.password | quote }}
              fi
              {{- else }}
              PW={{ .Values.clickhouse.password | quote }}
              {{- end }}
              # Ensure there is exactly one top-level query_store block in the overrides file.
              # Strip any existing query_store block, then prepend a fresh one with the password.
              CLEANED="$CONFIG.cleaned"
              if [ -f "$CONFIG" ]; then
                awk '
                  /^query_store:/ {in_qs=1; next}
                  in_qs && /^[^[:space:]]/ {in_qs=0}
                  !in_qs {print}
                ' "$CONFIG" > "$CLEANED" || cp "$CONFIG" "$CLEANED"
              else
                : > "$CLEANED"
              fi
              printf 'query_store:\n  enabled: true\n  password: "%s"\n' "$PW" > "$CONFIG.tmp" || true
              if [ -s "$CLEANED" ]; then
                cat "$CLEANED" >> "$CONFIG.tmp"
              fi
              mv "$CONFIG.tmp" "$CONFIG"
          volumeMounts:
            - name: config-overrides
              mountPath: /app/config-overrides
            {{- if .Values.clickhouse.existingSecret }}
            - name: clickhouse-secret
              mountPath: /secrets
              readOnly: true
            {{- end }}
        {{- end }}
        {{- if and .Values.config.persistence.enabled .Values.sync.enabled }}
        - name: set-sync-config
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              CONFIG="/app/config-overrides/config.yaml"
              mkdir -p /app/config-overrides
              CLEANED="$CONFIG.cleaned"
              if [ -f "$CONFIG" ]; then
                awk '
                  /^sync:/ {in_sync=1; next}
                  in_sync && /^[^[:space:]]/ {in_sync=0}
                  !in_sync {print}
                ' "$CONFIG" > "$CLEANED" || cp "$CONFIG" "$CLEANED"
              else
                : > "$CLEANED"
              fi
              CONFIG_TMP="$CONFIG.tmp"
              : > "$CONFIG_TMP"
              # Write sync block from Helm values
              printf 'sync:\n' >> "$CONFIG_TMP"
              printf '  enabled: %s\n' "{{ ternary "true" "false" .Values.sync.enabled }}" >> "$CONFIG_TMP"
              printf '  role: %s\n' "{{ .Values.sync.role }}" >> "$CONFIG_TMP"
              {{- if eq .Values.sync.role "primary" }}
              {{- if .Values.sync.tokens }}
              printf '  tokens:\n' >> "$CONFIG_TMP"
              {{- range .Values.sync.tokens }}
              printf '    - id: %s\n' "{{ .id }}" >> "$CONFIG_TMP"
              printf '      name: %s\n' "{{ .name }}" >> "$CONFIG_TMP"
              {{- end }}
              {{- end }}
              {{- else if eq .Values.sync.role "replica" }}
              printf '  primary_url: %s\n' "{{ .Values.sync.primaryURL }}" >> "$CONFIG_TMP"
              printf '  sync_token: %s\n' "{{ .Values.sync.syncToken }}" >> "$CONFIG_TMP"
              printf '  sync_interval: %s\n' "{{ .Values.sync.syncInterval }}" >> "$CONFIG_TMP"
              {{- if .Values.sync.statsSourceURL }}
              printf '  stats_source_url: %s\n' "{{ .Values.sync.statsSourceURL }}" >> "$CONFIG_TMP"
              {{- end }}
              {{- end }}
              # Append cleaned original config (without previous sync block)
              if [ -s "$CLEANED" ]; then
                cat "$CLEANED" >> "$CONFIG_TMP"
              fi
              mv "$CONFIG_TMP" "$CONFIG"
          volumeMounts:
            - name: config-overrides
              mountPath: /app/config-overrides
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "beyond-ads-dns.name" . }}
          image: {{ include "beyond-ads-dns.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: http
              containerPort: 80
            - name: control
              containerPort: 8081
          env:
            - name: DEFAULT_CONFIG_PATH
              value: "/app/config/default.yaml"
            - name: CONFIG_PATH
              value: "/app/config-overrides/config.yaml"
            - name: PORT
              value: "80"
            - name: STATIC_DIR
              value: "/app/public"
            - name: DNS_CONTROL_URL
              value: "http://127.0.0.1:8081"
            - name: REDIS_URL
              value: {{ include "beyond-ads-dns.redisUrl" . | quote }}
            {{- if and .Values.redis.enabled (index .Values "redis" "auth" "enabled") }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis
                  key: redis-password
            {{- end }}
            {{- if .Values.clickhouse.enabled }}
            - name: CLICKHOUSE_ENABLED
              value: "true"
            - name: CLICKHOUSE_URL
              value: {{ include "beyond-ads-dns.clickhouseUrl" . | quote }}
            - name: CLICKHOUSE_DATABASE
              value: {{ .Values.clickhouse.database | quote }}
            - name: CLICKHOUSE_TABLE
              value: {{ .Values.clickhouse.table | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.username | quote }}
            {{- if .Values.clickhouse.existingSecret }}
            {{- if .Values.clickhouse.existingSecret }}
            - name: QUERY_STORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.existingSecret }}
                  key: {{ .Values.clickhouse.passwordSecretKey | default "password" }}
            {{- else if and (ne .Values.clickhouse.password "") (not .Values.clickhouse.existingSecret) }}
            - name: QUERY_STORE_PASSWORD
              value: {{ .Values.clickhouse.password | quote }}
            {{- end }}
            {{- end }}
            {{- else }}
            - name: CLICKHOUSE_ENABLED
              value: "false"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- /* Emit CLICKHOUSE_ENABLED last when disabled so extraEnv/extraEnvFrom cannot override */}}
            {{- if not .Values.clickhouse.enabled }}
            - name: CLICKHOUSE_ENABLED
              value: "false"
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $probes := .Values.probes | default dict }}
          {{- $probePort := index $probes "port" | default .Values.service.controlPort | default 8081 }}
          {{- if index $probes "startup" "enabled" }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ $probePort }}
            initialDelaySeconds: {{ ($probes.startup).initialDelaySeconds | default 10 }}
            periodSeconds: {{ ($probes.startup).periodSeconds | default 5 }}
            failureThreshold: {{ ($probes.startup).failureThreshold | default (ternary 30 24 .Values.clickhouse.enabled) }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $probePort }}
            initialDelaySeconds: {{ ($probes.liveness).initialDelaySeconds | default 10 }}
            periodSeconds: {{ ($probes.liveness).periodSeconds | default 10 }}
            timeoutSeconds: {{ ($probes.liveness).timeoutSeconds | default 5 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $probePort }}
            initialDelaySeconds: {{ ($probes.readiness).initialDelaySeconds | default 5 }}
            periodSeconds: {{ ($probes.readiness).periodSeconds | default 5 }}
            timeoutSeconds: {{ ($probes.readiness).timeoutSeconds | default 3 }}
          volumeMounts:
            - name: config-overrides
              mountPath: /app/config-overrides
      volumes:
        - name: config-overrides
          {{- if .Values.config.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.config.persistence.existingClaim | default (printf "%s-config" (include "beyond-ads-dns.fullname" .)) }}
          {{- else if not .Values.clickhouse.enabled }}
          configMap:
            name: {{ include "beyond-ads-dns.fullname" . }}-config-overrides
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- if and .Values.clickhouse.enabled .Values.clickhouse.existingSecret }}
        - name: clickhouse-secret
          secret:
            secretName: {{ .Values.clickhouse.existingSecret }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
