{{- /* When ClickHouse is disabled, provide a config override so the app does not try to connect (works with any image). */}}
{{- if not .Values.clickhouse.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "beyond-ads-dns.fullname" . }}-config-overrides
  labels:
    {{- include "beyond-ads-dns.labels" . | nindent 4 }}
data:
  config.yaml: |
    # Disable query store when ClickHouse is not used (set by chart when clickhouse.enabled is false)
    query_store:
      enabled: false
{{- if .Values.sync.enabled }}
    # Primary/replica sync configuration (rendered by Helm)
    sync:
      enabled: true
      role: {{ .Values.sync.role | quote }}
{{- if eq .Values.sync.role "primary" }}
{{- if .Values.sync.tokens }}
      tokens:
{{- range .Values.sync.tokens }}
        - id: {{ .id | quote }}
          name: {{ .name | quote }}
{{- end }}
{{- end }}
{{- else if eq .Values.sync.role "replica" }}
      primary_url: {{ .Values.sync.primaryURL | quote }}
      sync_token: {{ .Values.sync.syncToken | quote }}
      sync_interval: {{ .Values.sync.syncInterval | quote }}
{{- if .Values.sync.statsSourceURL }}
      stats_source_url: {{ .Values.sync.statsSourceURL | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
