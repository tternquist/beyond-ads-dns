{{- if and .Values.clickhouse.enabled .Values.clickhouse.runInitJob }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "beyond-ads-dns.fullname" . }}-clickhouse-init
  labels:
    {{- include "beyond-ads-dns.labels" . | nindent 4 }}
data:
  # CREATE TABLE only (CREATE DATABASE is run separately via curl)
  init.sql: |
    CREATE TABLE IF NOT EXISTS beyond_ads.dns_queries
    (
        ts DateTime,
        client_ip String,
        client_name String DEFAULT '',
        protocol LowCardinality(String),
        qname String,
        qtype LowCardinality(String),
        qclass LowCardinality(String),
        outcome LowCardinality(String),
        rcode LowCardinality(String),
        duration_ms Float64,
        cache_lookup_ms Float64 DEFAULT 0,
        network_write_ms Float64 DEFAULT 0,
        upstream_address LowCardinality(String) DEFAULT ''
    )
    ENGINE = MergeTree
    PARTITION BY toDate(ts)
    ORDER BY (ts, qname)
    TTL toDate(ts) + INTERVAL 7 DAY;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "beyond-ads-dns.fullname" . }}-clickhouse-init
  labels:
    {{- include "beyond-ads-dns.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "beyond-ads-dns.name" . }}
        app.kubernetes.io/component: clickhouse-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              URL="{{ include "beyond-ads-dns.clickhouseUrl" . }}"
              AUTH_ARGS=""
              if [ -n "${CH_ADMIN_PASSWORD:-}" ]; then
                AUTH_ARGS="--user ${CH_ADMIN_USER}:${CH_ADMIN_PASSWORD}"
              fi
              # ClickHouse HTTP: one query per POST body, with retries while endpoint starts up
              max_attempts=40
              attempt=1
              until curl -sf ${AUTH_ARGS} -X POST "${URL}/" --data-binary "CREATE DATABASE IF NOT EXISTS beyond_ads" && \
                    curl -sf ${AUTH_ARGS} -X POST "${URL}/" --data-binary @/init/init.sql; do
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "ERROR: Timed out waiting for ClickHouse HTTP endpoint at ${URL} after ${max_attempts} attempts (approx $((max_attempts*3))s)."
                  echo "Please ensure ClickHouse is installed and the service is reachable, or disable clickhouse.runInitJob and create the schema manually."
                  exit 1
                fi
                echo "waiting for ClickHouse at ${URL} (attempt ${attempt}/${max_attempts})"
                attempt=$((attempt+1))
                sleep 3
              done
              echo "ClickHouse init done"
          volumeMounts:
            - name: init-sql
              mountPath: /init
              readOnly: true
          env:
            - name: CH_ADMIN_USER
              value: {{ default "default" .Values.clickhouse.adminUser | quote }}
            {{- if .Values.clickhouse.adminExistingSecret }}
            - name: CH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.adminExistingSecret }}
                  key: {{ .Values.clickhouse.adminPasswordSecretKey | default "password" }}
            {{- else if .Values.clickhouse.adminPassword }}
            - name: CH_ADMIN_PASSWORD
              value: {{ .Values.clickhouse.adminPassword | quote }}
            {{- end }}
      volumes:
        - name: init-sql
          configMap:
            name: {{ include "beyond-ads-dns.fullname" . }}-clickhouse-init
{{- end }}
