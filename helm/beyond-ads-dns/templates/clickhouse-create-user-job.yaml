{{- if and .Values.clickhouse.enabled .Values.clickhouse.createUser }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "beyond-ads-dns.fullname" . }}-clickhouse-create-user
  labels:
    {{- include "beyond-ads-dns.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "beyond-ads-dns.name" . }}
        app.kubernetes.io/component: clickhouse-create-user
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-clickhouse-user
          image: {{ .Values.clickhouse.createUserJobImage | quote }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              URL={{ include "beyond-ads-dns.clickhouseUrl" . }}
              USER={{ .Values.clickhouse.username }}
              DB={{ .Values.clickhouse.database }}
              TABLE={{ .Values.clickhouse.table }}
              {{- if .Values.clickhouse.existingSecret }}
              PASS=$(cat /secrets/{{ .Values.clickhouse.passwordSecretKey | default "password" }})
              {{- else }}
              PASS={{ .Values.clickhouse.password | quote }}
              {{- end }}
              AUTH_ARGS=""
              if [ -n "${CH_ADMIN_PASSWORD:-}" ]; then
                AUTH_ARGS="--user ${CH_ADMIN_USER}:${CH_ADMIN_PASSWORD}"
              fi
              SQL_CREATE_USER="CREATE USER IF NOT EXISTS ${USER} IDENTIFIED WITH plaintext_password BY '${PASS}';"
              SQL_GRANTS="GRANT SELECT, INSERT ON ${DB}.${TABLE} TO ${USER};"
              echo "Creating ClickHouse user ${USER} and granting access on ${DB}.${TABLE}..."
              # POST SQL in the request body to avoid URL encoding/length issues
              max_attempts=40
              attempt=1
              until curl -sf ${AUTH_ARGS} -X POST "${URL}/" --data-binary "${SQL_CREATE_USER}"; do
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "ERROR: Timed out waiting for ClickHouse HTTP endpoint at ${URL} after ${max_attempts} attempts (approx $((max_attempts*3))s)."
                  echo "Please ensure ClickHouse is installed and the service is reachable, or disable clickhouse.createUser and create the user manually."
                  exit 1
                fi
                echo "waiting for ClickHouse at ${URL} (attempt ${attempt}/${max_attempts})"
                attempt=$((attempt+1))
                sleep 3
              done
              # Apply grants (idempotent if run multiple times)
              curl -sf ${AUTH_ARGS} -X POST "${URL}/" --data-binary "${SQL_GRANTS}"
              echo "ClickHouse user creation and grants finished"
          env:
            - name: CH_ADMIN_USER
              value: {{ default "default" .Values.clickhouse.adminUser | quote }}
            {{- if .Values.clickhouse.adminExistingSecret }}
            - name: CH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.adminExistingSecret }}
                  key: {{ .Values.clickhouse.adminPasswordSecretKey | default "password" }}
            {{- else if .Values.clickhouse.existingSecret }}
            - name: CH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.existingSecret }}
                  key: {{ .Values.clickhouse.passwordSecretKey | default "password" }}
            {{- else if .Values.clickhouse.adminPassword }}
            - name: CH_ADMIN_PASSWORD
              value: {{ .Values.clickhouse.adminPassword | quote }}
            {{- else if .Values.clickhouse.password }}
            - name: CH_ADMIN_PASSWORD
              value: {{ .Values.clickhouse.password | quote }}
            {{- end }}
          {{- if .Values.clickhouse.existingSecret }}
          volumeMounts:
            - name: clickhouse-secret
              mountPath: /secrets
              readOnly: true
          {{- end }}
      volumes:
      {{- if .Values.clickhouse.existingSecret }}
        - name: clickhouse-secret
          secret:
            secretName: {{ .Values.clickhouse.existingSecret }}
      {{- end }}
{{- end }}
