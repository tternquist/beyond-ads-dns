{{- if and .Values.clickhouse.enabled .Values.clickhouse.createUser }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "beyond-ads-dns.fullname" . }}-clickhouse-create-user
  labels:
    {{- include "beyond-ads-dns.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "beyond-ads-dns.name" . }}
        app.kubernetes.io/component: clickhouse-create-user
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-clickhouse-user
          image: {{ .Values.clickhouse.createUserJobImage | quote }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              URL={{ include "beyond-ads-dns.clickhouseUrl" . }}
              USER={{ .Values.clickhouse.username }}
              DB={{ .Values.clickhouse.database }}
              {{- if .Values.clickhouse.existingSecret }}
              PASS=$(cat /secrets/{{ .Values.clickhouse.passwordSecretKey | default "password" }})
              {{- else }}
              PASS={{ .Values.clickhouse.password | quote }}
              {{- end }}

              SQL_CREATE_USER="CREATE USER IF NOT EXISTS ${USER} IDENTIFIED WITH plaintext_password BY '${PASS}'"
              SQL_GRANT_DB="GRANT ALL ON ${DB}.* TO ${USER}"
              SQL_GRANT_SYS_PARTS="GRANT SELECT ON system.parts TO ${USER}"

              echo "Waiting for ClickHouse HTTP endpoint at ${URL}..."
              until curl -sf -X POST "${URL}/" --data-binary "SELECT 1" > /dev/null; do
                echo "waiting for ClickHouse at ${URL}"
                sleep 3
              done

              echo "Creating ClickHouse user ${USER}..."
              curl -sS -X POST "${URL}/" --data-binary "${SQL_CREATE_USER}"

              echo "Granting ALL on ${DB}.* to ${USER}..."
              curl -sS -X POST "${URL}/" --data-binary "${SQL_GRANT_DB}"

              echo "Granting SELECT on system.parts to ${USER}..."
              curl -sS -X POST "${URL}/" --data-binary "${SQL_GRANT_SYS_PARTS}"

              echo "ClickHouse user creation finished"
          {{- if .Values.clickhouse.existingSecret }}
          volumeMounts:
            - name: clickhouse-secret
              mountPath: /secrets
              readOnly: true
          {{- end }}
      volumes:
      {{- if .Values.clickhouse.existingSecret }}
        - name: clickhouse-secret
          secret:
            secretName: {{ .Values.clickhouse.existingSecret }}
      {{- end }}
{{- end }}
