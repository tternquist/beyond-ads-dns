# Example values file for a replica beyond-ads-dns release.
#
# Usage:
#   helm upgrade --install beyond-ads-dns-replica ./helm/beyond-ads-dns \
#     -n beyond-ads-dns \
#     -f helm/beyond-ads-dns/values-replica.yaml
#
# This release:
# - Runs as a **sync replica**.
# - Periodically pulls DNS-affecting config from the primary via /sync/config.
# - Uses its own Redis + PVC, but shares DNS config with the primary.
# - Exposes DNS, metrics UI, and control API via LoadBalancer (e.g. MetalLB).
#   Override with --set service.type=NodePort if you do not want an external IP.
replicaCount: 2

service:
  type: LoadBalancer
  # Uncomment and set to your MetalLB pool if needed:
  # annotations:
  #   metallb.universe.tf/address-pool: lab-pool

redis:
  # Install Redis as a subchart for this release
  enabled: true

clickhouse:
  enabled: true
  # Route app traffic via the compatibility Service "clickhouse"
  # that always targets the primary ClickHouse pod.
  url: "http://clickhouse:8123"
  # For the bundled ClickHouse subchart (auth disabled by default), the
  # simplest option is to use the ClickHouse admin user directly so the
  # query store and UI have full privileges without extra grants.
  #
  # This example uses the built‑in "default" user with no password:
  username: default
  runInitJob: false
  createUser: false
  # When talking to an external ClickHouse with authentication enabled,
  # set clickhouse.username to an admin user and point existingSecret at
  # a Secret that contains its password. In that case you should keep
  # clickhouse.createUser=false so the chart does not try to create a
  # separate less‑privileged user.
  # existingSecret: beyond-ads-dns-clickhouse

config:
  # Replicas treat config as ephemeral – DNS-affecting config is pulled
  # from the primary via /sync/config, so they do not need a PVC for
  # config-overrides. Use non-persistent config here to avoid stale YAML.
  persistence:
    enabled: false

sync:
  enabled: true
  role: replica

  # Control API URL for the primary release (values-primary.yaml example).
  # The primary Service is named "<release>-beyond-ads-dns", so if the primary
  # release is "beyond-ads-dns-primary", the Service DNS name is:
  #   beyond-ads-dns-primary-beyond-ads-dns.<namespace>.svc.cluster.local
  # For in-namespace access, the short name "beyond-ads-dns-primary:8081" is sufficient.
  primaryURL: "http://beyond-ads-dns-primary:8081"

  # Token ID that must match one of sync.tokens[*].id on the primary.
  syncToken: "replica-1"

  # How often this replica pulls /sync/config.
  syncInterval: "60s"

dns:
  # Use NodePort on a different port than the primary to avoid Service collisions.
  exposeMode: nodePort
  nodePort: 30053

