# Default values for beyond-ads-dns.
# See chart README and docs/helm-chart-feasibility.md for design notes.

# -- Number of app replicas (ignored when dns.exposeMode is hostNetwork and dns.daemonSet is true)
replicaCount: 1

image:
  repository: ghcr.io/tternquist/beyond-ads-dns
  tag: latest
  pullPolicy: Always

# -- DNS exposure. Default nodePort avoids "didn't have free ports" (hostNetwork needs port 53/80 free on the node).
# nodePort: DNS at <node-ip>:nodePort (no hostNetwork). hostNetwork: bind port 53 on node (often conflicts with systemd-resolved).
dns:
  exposeMode: nodePort
  nodePort: 30053   # must be 30000-32767
  daemonSet: false   # only used when exposeMode is hostNetwork (one resolver per node)

# -- Redis (required). Use external Redis (redis.url) or install Bitnami Redis as a dependency (redis.enabled: true).
redis:
  # When true, installs Bitnami Redis as a subchart and app uses it automatically. When false, set redis.url to your Redis.
  enabled: false
  url: "redis://beyond-ads-dns-redis:6379"
  # existingSecret: ""   # when using external Redis: secret with REDIS_PASSWORD or redis-url
  # passwordSecretKey: REDIS_PASSWORD
  # --- Bitnami Redis subchart values (used only when redis.enabled: true) ---
  architecture: standalone
  auth:
    enabled: false
  # Use latest so pulls succeed (Bitnami removes old versioned tags; set a specific tag to pin)
  image:
    tag: latest
  master:
    persistence:
      enabled: true
      size: 512Mi

# -- ClickHouse (optional query store). Use external URL or install via a dependency chart.
clickhouse:
  enabled: false
  # When using the bundled ClickHouse subchart, you can leave `url` empty
  # and the chart will default to `http://<release-name>-clickhouse:8123`.
  # When using an external ClickHouse, set `clickhouse.url` explicitly
  # (e.g. `http://clickhouse:8123` or an external hostname).
  url: ""
  database: beyond_ads
  table: dns_queries
  username: beyondads
  # existingSecret: ""   # keys: password or clickhouse-password (query-store user)
  # Run a one-off Job to apply db/clickhouse/init.sql (use when using external ClickHouse)
  runInitJob: false
  # Make ClickHouse user/password configurable. When `createUser` is true the
  # chart will run a post-install hook Job to create the user on the ClickHouse
  # HTTP endpoint. Prefer using `existingSecret` to store the password instead
  # of putting it in plain text here.
  createUser: false
  password: ""
  existingSecret: ""   # name of Secret containing password key for the query-store user (see passwordSecretKey)
  passwordSecretKey: password
  createUserJobImage: curlimages/curl:latest
  # Admin credentials used by init/create-user/grant Jobs when ClickHouse
  # requires authentication. If not set, the Jobs fall back to the query-store
  # secret/password (existingSecret/password) when present, or run without auth.
  adminUser: default
  adminPassword: ""
  adminExistingSecret: ""       # Secret with admin password (takes precedence over existingSecret)
  adminPasswordSecretKey: password
  # Create a compatibility Service named "clickhouse" that points at the
  # ClickHouse subchart pods, so the app (and tools) can use the legacy
  # host "clickhouse:8123" as well as the release-scoped service name.
  compatService:
    enabled: true
  # --- Bitnami ClickHouse subchart values (used only when clickhouse.enabled: true) ---
  auth:
    enabled: false
  image:
    tag: latest
  persistence:
    enabled: true
    size: 8Gi

# -- Persist config-overrides (and admin password file) so UI/CLI changes survive restarts
config:
  persistence:
    enabled: true
    size: 1Gi
    # storageClass: ""  # optional
  # existingClaim: ""   # use existing PVC instead of creating one

# -- Optional token to force a rolling restart when using persisted config (PVC).
# Change this value (for example via `--set restartToken=$(date +%s)`) to trigger
# a Deployment rollout even though config changes live inside the volume.
restartToken: ""

# -- Extra env vars for the app (e.g. HOSTNAME, UI_PASSWORD, SESSION_SECRET)
extraEnv: []
# - name: HOSTNAME
#   value: "dns.example.com"
# - name: UI_PASSWORD
#   valueFrom:
#     secretKeyRef:
#       name: beyond-ads-dns-admin
#       key: password

# -- Extra env from existing secrets (e.g. REDIS_PASSWORD, QUERY_STORE_PASSWORD)
extraEnvFrom: []
# - secretRef:
#     name: beyond-ads-dns-redis
# - secretRef:
#     name: beyond-ads-dns-clickhouse

# -- Resource limits/requests
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# -- Pod security context (container still needs cap_net_bind_service for port 53)
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0

securityContext:
  capabilities:
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: false

# -- Node selector / affinity / tolerations
nodeSelector: {}
tolerations: []
affinity: {}

# -- Liveness/readiness/startup probes. /health is on the control server (port 8081), not the metrics UI (80).
# App must connect to Redis and start the control server before /health succeeds. If you see "connection refused"
# on 8081, the control server is not up yet—increase startup.initialDelaySeconds (e.g. 20) or check pod logs (Redis reachable?).
# With ClickHouse enabled, the app retries the query store for up to 2 minutes before /health is available.
# When redis.enabled is true, an init container waits for Redis so the app connects quickly.
probes:
  port: 8081   # Control server port for /health (do not use 80 — that is the metrics UI)
  startup:
    enabled: true
    initialDelaySeconds: 10   # First probe after this delay; use wait-for-redis init (redis.enabled) or increase for slow Redis
    periodSeconds: 5
    # failureThreshold: set automatically (24 without ClickHouse, 30 with); override to tune (e.g. 36 for 3 min)
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3

# -- Ingress for Metrics UI (optional)
ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: beyond-ads-dns.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# -- Service type for the main service (ClusterIP, NodePort, LoadBalancer)
# Set type: LoadBalancer to expose metrics UI and control API via MetalLB (or cloud LB).
service:
  type: ClusterIP
  # Optional annotations (e.g. MetalLB: metallb.universe.tf/address-pool, or loadBalancerIP)
  annotations: {}
  # When dns.exposeMode is nodePort, DNS port 53 is always exposed as NodePort (dns.nodePort)
  metricsPort: 80
  controlPort: 8081

# -- Primary/replica sync configuration (see docs/helm-primary-replica-sync.md)
# When enabled, these values are rendered into config-overrides/config.yaml so the
# Go app can run as a sync primary or replica. Recommended topology is:
# - One Helm release with sync.role=primary
# - One or more releases with sync.role=replica pointing at the primary's control URL.
sync:
  # -- Global toggle for sync. When false, the sync client/server are disabled.
  enabled: false
  # -- Role for this release: "primary" or "replica".
  role: primary

  # Primary-only fields (used when role: primary)
  # List of replica tokens. Each replica authenticates with one of these IDs.
  tokens: []
  # Example:
  # tokens:
  #   - id: "replica-1"
  #     name: "cluster-replica-1"

  # Replica-only fields (used when role: replica)
  # URL of the primary's control API, e.g.:
  # "http://beyond-ads-dns.beyond-ads-dns.svc.cluster.local:8081"
  primaryURL: ""
  # Token ID configured on the primary (sync.tokens[*].id).
  syncToken: ""
  # How often replicas pull /sync/config from the primary.
  syncInterval: "60s"
  # Optional URL (e.g. Metrics UI) where replicas fetch stats for /sync/stats.
  statsSourceURL: ""
